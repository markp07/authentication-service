name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  build-backend:
    name: Build Backend Services
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build Maven projects
        run: mvn clean package -DskipTests
      
      - name: Upload authentication-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: authentication-service-jar
          path: authentication-service/target/authentication-*.jar
          retention-days: 1
      
      - name: Upload weather-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: weather-service-jar
          path: weather-service/target/weather-*.jar
          retention-days: 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 1

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download authentication-service JAR
        uses: actions/download-artifact@v4
        with:
          name: authentication-service-jar
          path: authentication-service/target
      
      - name: Download weather-service JAR
        uses: actions/download-artifact@v4
        with:
          name: weather-service-jar
          path: weather-service/target
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build authentication-service Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./authentication-service
          file: ./authentication-service/Dockerfile
          push: false
          tags: authentication-service:latest
      
      - name: Build weather-service Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./weather-service
          file: ./weather-service/Dockerfile
          push: false
          tags: weather-service:latest
      
      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: frontend:latest
