name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-backend:
    name: Build backend JARs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build backend JARs
        run: mvn -B -T 1C clean package --fail-at-end --show-version -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: List produced backend artifacts
        run: |
          echo "Listing possible artifact locations"
          ls -la target || true
          ls -la authentication-service/target || true
          ls -la common/target || true
          ls -la weather-service/target || true
          ls -la */target || true

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifacts
          # Upload any jars/wars produced by submodules as well (glob)
          path: |
            **/target/*.jar
            **/target/*.war
          if-no-files-found: warn

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run test
          npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifacts
          # Next.js produces a .next folder (and optionally `out` for static export).
          # Upload .next (and out if present) so downstream jobs can access the build output.
          path: |
            frontend/.next
            frontend/.next/**
            frontend/out
          if-no-files-found: warn

  build-images:
    name: Build all images with docker compose
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-artifacts
          path: build-out/backend

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifacts
          # place Next.js build under the frontend folder so docker build can access it
          path: frontend/.next

      - name: Inspect downloaded artifacts
        run: |
          echo 'Backend artifacts:'
          ls -la build-out/backend || true
          echo 'Frontend .next contents:'
          ls -la frontend/.next || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        env:
          DOCKER_BUILDKIT: 1
        run: docker compose build --no-cache --parallel