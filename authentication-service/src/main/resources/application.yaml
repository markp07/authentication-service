# Set the base path for the API
server:
  port: 12002
  servlet:
    context-path: /api/auth

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  private-key: classpath:keys/private_key.pem
  public-key: classpath:keys/public_key.pem

spring:
  cache:
    type: redis
  data:
    redis:
      host: authentication-redis
      port: 6379
  datasource:
    url: jdbc:postgresql://authentication-postgres:5432/authentication_service?useUnicode=true&characterEncoding=UTF-8
    username: authentication_service
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        connection:
          useUnicode: true
          characterEncoding: UTF-8
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
  mail:
    host: ${SMTP_HOST:smtp.example.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:your_smtp_username}
    password: ${SMTP_PASSWORD:your_smtp_password}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

security:
  excluded-paths: /actuator/health,/actuator/info,/actuator/prometheus,/api/auth/actuator/health,/api/auth/actuator/info,/api/auth/actuator/prometheus,/swagger-ui.html,/swagger-ui/**,/*/api-docs,/v1/register,/v1/login,/v1/refresh,/v1/2fa/verify,/v1/password/forgot,/v1/password/reset,/v1/public-key,/v1/passkey/login/start,/v1/passkey/login/finish,/v1/passkey/login/usernameless/start,/v1/passkey/login/usernameless/finish,/v1/email/verify

authentication:
  cors:
    allowed-origin-patterns: http://localhost:12006,https://*.${BASE_DOMAIN:yourdomain.tld}

email:
  service:
    enabled: ${EMAIL_SERVICE_ENABLED:false}
  from: ${EMAIL_FROM:no-reply@example.com}
  from-name: ${EMAIL_FROM_NAME:Authentication Service}
  base-url: ${EMAIL_BASE_URL:https://auth.yourdomain.tld}
  subject:
    reset-password: "Password Reset Request"
    email-verification: "Verify Your Email Address"
  body:
    reset-password: "Hi {userName},\nTo reset your password, use the following link: ${EMAIL_BASE_URL:https://auth.yourdomain.tld}/?token={resetToken}\nRegards,\nAuthentication Service"
    email-verification: "Hi {userName},\n\nPlease verify your email address by clicking the following link:\n{verificationLink}\n\nIf the link doesn't work, you can manually enter your verification token at:\n{manualVerificationLink}\n\nYour verification token is: {verificationToken}\n\nThis link will expire in 24 hours.\n\nRegards,\nAuthentication Service"

cookie:
  secure: true
  domain: "${BASE_DOMAIN:yourdomain.tld}"

webauthn:
  rp:
    name: "Authentication Service"
    id: "${WEBAUTHN_RP_ID:auth.yourdomain.tld}"
  origin: "${WEBAUTHN_ORIGIN:https://auth.yourdomain.tld}"

---
# Local environment profile
spring:
  config:
    activate:
      on-profile: local
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 12005
  datasource:
    url: jdbc:postgresql://localhost:12004/authentication_service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

authentication:
  cors:
    allowed-origin-patterns: "http://localhost:3000"

cookie:
  secure: false
  domain: "localhost"

webauthn:
  rp:
    name: "Authentication Service"
    id: "localhost"
  origin: "http://localhost:3000"

---
# UT environment profile
spring:
  config:
    activate:
      on-profile: ut

jwt:
  private-key: ""
  public-key: ""

security:
  excluded-paths: /actuator/health,/actuator/info,/swagger-ui.html,/swagger-ui/**,/*/api-docs,/v1/login,/v1/register,/v1/refresh,/v1/2fa/verify,/v1/password/forgot,/v1/password/reset,/v1/public-key,/v1/passkey/login/start,/v1/passkey/login/finish,/v1/passkey/login/usernameless/start,/v1/passkey/login/usernameless/finish
