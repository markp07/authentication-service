# Set the base path for the API
server:
  port: 12002
  servlet:
    context-path: /api/auth

management:
  endpoints:
    web:
      exposure:
        include: '*'

jwt:
  private-key: classpath:keys/private_key.pem
  public-key: classpath:keys/public_key.pem

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/authentication_service?useUnicode=true&characterEncoding=UTF-8
    username: authentication_service
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        connection:
          useUnicode: true
          characterEncoding: UTF-8
  mail:
    host: smtp.example.com
    port: 587
    username: your_smtp_username
    password: your_smtp_password
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

security:
  excluded-paths: /v1/auth/register,/v1/auth/login,/v1/auth/refresh,/v1/auth/2fa/verify,/v1/auth/password/forgot,/v1/auth/password/reset,/v1/public-key

authentication:
  cors:
    allowed-origin-patterns: "http://localhost:12006"

email:
  from: "no-reply@example.com"
  subject:
    reset-password: "Password Reset Request"
  body:
    reset-password: "Hi {userName},\nTo reset your password, use the following link: http://localhost:3000/?token={resetToken}\nRegards,\nAuthentication Demo Service"

cookie:
  secure: true

---
# Local environment profile
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:12004/authentication_service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

authentication:
  cors:
    allowed-origin-patterns: "http://localhost:3000"

cookie:
  secure: false


logging:
  level:
    root: DEBUG
    nl.markpost.demo: DEBUG