# Set the base path for the API
server:
  port: 12002
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: '*'

spring:
  datasource:
    url: jdbc:postgresql://postgres:12004/authentication_service?useUnicode=true&characterEncoding=UTF-8
    username: authentication_service
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        connection:
          useUnicode: true
          characterEncoding: UTF-8

jwt:
  private-key: classpath:keys/private_key.pem
  public-key: classpath:keys/public_key.pem

security:
  excluded-paths:
    - /v1/auth/register
    - /v1/auth/login
    - /v1/auth/password/forgot
    - /v1/auth/password/reset

---
# Local environment profile
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:12004/authentication_service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect