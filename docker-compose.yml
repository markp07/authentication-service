services:
  authentication-redis:
    image: redis:latest
    container_name: authentication-redis
    restart: unless-stopped
    ports:
      - '12005:6379'
    command: [ "redis-server", "--bind", "0.0.0.0" ]
    hostname: authentication-redis
    volumes:
      - cache:/data
    networks:
      default-network:
        aliases:
          - authentication-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  authentication-postgres:
    image: postgres:latest
    container_name: authentication-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentication_service
      POSTGRES_USER: authentication_service
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '12004:5432'
    volumes:
      - ./postgres_data:/var/lib/postgresql
    networks:
      default-network:
        aliases:
          - authentication-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentication_service -d authentication_service"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  authentication-service:
    image: authentication-service:latest
    container_name: authentication-service
    restart: unless-stopped
    build:
      context: ./authentication-service
      dockerfile: Dockerfile
    depends_on:
      authentication-redis:
        condition: service_healthy
      authentication-postgres:
        condition: service_healthy
    ports:
      - '12002:12002'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      EMAIL_SERVICE_ENABLED: ${EMAIL_SERVICE_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@example.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Authentication Service}
      EMAIL_BASE_URL: ${EMAIL_BASE_URL:-https://auth.yourdomain.tld}
      BASE_DOMAIN: ${BASE_DOMAIN:-yourdomain.tld}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-auth.yourdomain.tld}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-https://auth.yourdomain.tld}
    volumes:
      - authentication_service_data:/data
    networks:
      default-network:
        aliases:
          - authentication-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12002/api/auth/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  authentication-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://auth.yourdomain.tld}
        NEXT_PUBLIC_BASE_DOMAIN: ${BASE_DOMAIN:-yourdomain.tld}
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@yourdomain.tld}
    container_name: authentication-frontend
    restart: unless-stopped
    ports:
      - "12006:3000"
    depends_on:
      authentication-service:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://auth.yourdomain.tld}
      NEXT_PUBLIC_BASE_DOMAIN: ${BASE_DOMAIN:-yourdomain.tld}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@yourdomain.tld}
    networks:
      default-network:
        aliases:
          - authentication-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  cache:
    driver: local
  authentication_service_data:
    driver: local

networks:
  default-network:
    external: true