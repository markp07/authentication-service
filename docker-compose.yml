services:
  redis:
    image: redis:latest
    restart: always
    ports:
      - '12005:6379'
    command: [ "redis-server", "--bind", "0.0.0.0" ]
    hostname: cache
    volumes:
      - cache:/data
    networks:
      - default-network

  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: authentication_service
      POSTGRES_USER: authentication_service
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '12004:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - default-network

  authentication-service:
    image: authentication-service:latest
    container_name: authentication-service
    restart: always
    build:
      context: ./authentication-service
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    ports:
      - '12002:12002'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      EMAIL_SERVICE_ENABLED: ${EMAIL_SERVICE_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@example.com}
      EMAIL_BASE_URL: ${EMAIL_BASE_URL:-https://auth.markpost.dev}
    volumes:
      - authentication_service_data:/data
    networks:
      - default-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: authentication-frontend
    restart: always
    ports:
      - "12006:3000"
    depends_on:
      authentication-service:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: https://auth.markpost.dev
    networks:
      - default-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  cache:
    driver: local
  postgres_data:
    driver: local
  authentication_service_data:
    driver: local

networks:
  default-network:
    external: true