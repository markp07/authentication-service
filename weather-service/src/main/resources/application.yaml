# Set the base path for the API
server:
  port: 12001
  servlet:
    context-path: /api/weather

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      probes:
        enabled: true

spring:
  cache:
    type: redis
  data:
    redis:
      host: redis
      port: 12005
  datasource:
    url: jdbc:postgresql://postgres:5432/demo_authentication
    username: demo_user
    password: demo_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  excluded-paths: /actuator/health,/actuator/info,/actuator/prometheus,/api/weather/actuator/health,/api/weather/actuator/info,/api/weather/actuator/prometheus,/swagger-ui.html,/swagger-ui/**,/*/api-docs

authentication:
  cors:
    allowed-origin-patterns: http://localhost:12006,https://demo.markpost.dev

logging:
  level:
    root: DEBUG
    nl.markpost.demo: DEBUG

jwt:
  public-key-url: http://authentication-service:12002/api/auth/v1/public-key

---
# Local environment profile
spring:
  config:
    activate:
      on-profile: local
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 12005
  datasource:
    url: jdbc:postgresql://localhost:5432/demo_authentication
    username: demo_user
    password: demo_password
weather:
  cors:
    allowed-origin-patterns: "http://localhost:3000"

jwt:
  public-key-url: http://localhost:12002/api/auth/v1/public-key

---
# UT environment profile
spring:
  config:
    activate:
      on-profile: ut
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

security:
  excluded-paths: /actuator/health,/actuator/info,/swagger-ui.html,/swagger-ui/**,/*/api-docs,/v1/forecast
